repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: update-readme
        name: update readme usage
        entry: uv run python scripts/update_readme.py
        language: system
        pass_filenames: false
        files: ^src/anki_cli/cli\.py$
